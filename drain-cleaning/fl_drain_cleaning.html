<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FL Drain Cleaning &amp; Camera Inspection Cost Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0E1A;--card:#0F1629;--card-dark:#141929;--blue:#00B4FF;--gold:#F4B942;--orange:#F97316;--red:#EF4444;--green:#22C55E;--teal:#14B8A6;--text:#E8EAF0;--muted:#8892A4}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:0 0 80px}
h1{font-size:1.2rem;font-weight:800;text-align:center;padding:1rem 1rem 0.35rem;color:var(--blue);letter-spacing:-.01em}
.subtitle{text-align:center;font-size:0.77rem;color:var(--muted);padding:0 1rem 0.65rem;line-height:1.5}
.tab-bar{display:flex;background:var(--card-dark);border-bottom:1px solid #1e2540;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:0.7rem 0.2rem;border:none;background:transparent;color:var(--muted);font-size:0.7rem;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.content{max-width:480px;margin:0 auto;padding:0 1rem 1rem}
.card{background:var(--card);border-radius:12px;padding:1rem;margin:.65rem 0;border:1px solid #1e2540}
.card-red{border-color:var(--red)!important;background:#1a0808!important}
.card-orange{border-color:var(--orange)!important;background:#1a0d00!important}
.card-gold{border-color:var(--gold)!important;background:#141000!important}
.card-teal{border-color:var(--teal)!important;background:#001312!important}
.card-green{border-color:var(--green)!important;background:#001508!important}
.card-title{font-size:0.83rem;font-weight:700;margin-bottom:.45rem}
.ct-red{color:var(--red)}.ct-orange{color:var(--orange)}.ct-gold{color:var(--gold)}.ct-teal{color:var(--teal)}.ct-green{color:var(--green)}.ct-blue{color:var(--blue)}
.card-body{font-size:.8rem;line-height:1.65;color:var(--text)}
.step-label{font-size:.7rem;color:var(--blue);margin:1rem 0 .3rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.step-title{font-size:.97rem;font-weight:700;margin-bottom:.7rem;line-height:1.4}
.options{display:flex;flex-direction:column;gap:.45rem}
.opt-btn{background:var(--card);border:1.5px solid #1e2540;border-radius:10px;padding:.7rem .95rem;text-align:left;color:var(--text);font-size:.85rem;cursor:pointer;transition:all .15s;line-height:1.45;width:100%;font-family:inherit}
.opt-btn:hover{border-color:var(--blue);background:#0a1a2a}
.opt-btn.sel{border-color:var(--blue);background:#001a2e;color:var(--blue);font-weight:600}
.back-btn{background:transparent;border:1px solid #2a3050;border-radius:8px;padding:.45rem .9rem;color:var(--muted);font-size:.78rem;cursor:pointer;margin-top:.65rem;transition:all .2s;font-family:inherit}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}
.prog-wrap{margin:.75rem 0 .2rem}
.prog-bar{height:4px;background:#1e2540;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .35s}
.prog-text{font-size:.72rem;color:var(--muted);margin-top:.3rem;text-align:right}
.cost-wrap{text-align:center;padding:1.1rem 0 .6rem}
.cost-lbl{font-size:.72rem;color:var(--muted);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.06em}
.cost-amt{font-size:2.1rem;font-weight:800;color:var(--gold);letter-spacing:-.02em}
.cost-reg{font-size:.73rem;color:var(--muted);margin-top:.2rem}
.cost-svc{font-size:.77rem;color:var(--muted);text-align:center;margin-bottom:.6rem}
.lead-form{margin:.8rem 0}
.form-title{font-size:.83rem;font-weight:700;margin-bottom:.55rem;color:var(--gold)}
.form-row{display:flex;gap:.45rem;margin-bottom:.5rem;flex-wrap:wrap}
.form-input{flex:1;min-width:100px;background:var(--card-dark);border:1.5px solid #2a3050;border-radius:8px;padding:.6rem .7rem;color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s;-webkit-appearance:none;font-family:inherit}
.form-input::placeholder{color:var(--muted)}
.form-input:focus{border-color:var(--blue)}
.form-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:.6rem 1.15rem;font-size:.85rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:opacity .2s;font-family:inherit}
.form-btn:hover{opacity:.85}
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--gold);color:#000;font-weight:800;font-size:.875rem;padding:.7rem 1.4rem;border-radius:10px;z-index:1000;transition:transform .38s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.45)}
.toast.show{transform:translateX(-50%) translateY(0)}
.tbl-wrap{overflow-x:auto;margin:.4rem 0}
.tbl{width:100%;border-collapse:collapse;font-size:.76rem;min-width:380px}
.tbl th{background:#1e2540;padding:.45rem .5rem;text-align:left;color:var(--blue);font-weight:700;white-space:nowrap}
.tbl td{padding:.42rem .5rem;border-top:1px solid #1e2540;color:var(--text);vertical-align:top;line-height:1.45}
.tbl tr:nth-child(even) td{background:#0c1120}
.tbl td:first-child{font-weight:600;white-space:nowrap}
.fact-card{background:var(--card-dark);border-radius:10px;padding:.85rem;margin:.55rem 0;border-left:3px solid var(--blue)}
.fact-num{font-size:.68rem;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.22rem}
.fact-text{font-size:.8rem;color:var(--text);line-height:1.65}
.sec-hdr{font-size:.92rem;font-weight:700;margin:1rem 0 .45rem;color:var(--text)}
.proc-card{background:var(--card);border-radius:12px;padding:.85rem;margin:.55rem 0;border:1px solid #1e2540}
.proc-num{font-size:.68rem;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.2rem}
.proc-title{font-size:.9rem;font-weight:700;margin-bottom:.35rem;color:var(--text)}
.proc-body{font-size:.79rem;color:var(--muted);line-height:1.65}
.check-list{background:var(--card);border-radius:12px;padding:.5rem 1rem;margin:.6rem 0;border:1px solid #1e2540}
.check-item{display:flex;align-items:flex-start;gap:.7rem;padding:.55rem 0;border-bottom:1px solid #1e2540;cursor:pointer;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid #2a3050;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .2s;background:var(--card-dark);margin-top:1px}
.check-box.done{background:var(--green);border-color:var(--green);color:#000;font-weight:900}
.check-txt{font-size:.8rem;line-height:1.5;padding-top:2px}
.check-txt.done{color:var(--muted);text-decoration:line-through}
.gprog-wrap{margin:.65rem 0 .85rem}
.gprog-bg{height:8px;background:#1e2540;border-radius:4px;overflow:hidden}
.gprog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s ease}
.gprog-lbl{font-size:.73rem;color:var(--green);text-align:right;margin-top:.28rem;font-weight:700}
.reset-btn{background:transparent;border:1px solid var(--orange);border-radius:8px;padding:.45rem 1rem;color:var(--orange);font-size:.79rem;cursor:pointer;display:block;margin:.75rem auto 0;transition:all .2s;font-family:inherit}
.reset-btn:hover{background:var(--orange);color:#000}
@media(max-width:375px){h1{font-size:1.05rem}.cost-amt{font-size:1.75rem}.tbl{font-size:.72rem}.opt-btn{font-size:.8rem}}
</style>
</head>
<body>
<h1>&#x1F527; FL Drain Cleaning &amp; Camera Inspection</h1>
<p class="subtitle">Cost guide for Florida homeowners &#8212; accurate estimates &amp; licensed plumber connection</p>
<div class="tab-bar">
  <button class="tab-btn active" id="tb0" onclick="setTab(0)">&#x1F4B0; Cost Calc</button>
  <button class="tab-btn" id="tb1" onclick="setTab(1)">&#x1F4D6; FL Guide</button>
  <button class="tab-btn" id="tb2" onclick="setTab(2)">&#x2705; Checklist</button>
</div>
<div id="app" class="content"></div>
<div id="toast" class="toast">We'll call you within 2 hours!</div>

<script>
'use strict';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const S = {tab:0, step:1, answers:{}, checks:new Array(12).fill(false)};

const DRAINS = [
  ['main','Main sewer line (slow drains throughout house / sewage backup)'],
  ['kitchen','Kitchen drain (slow sink, grease clog)'],
  ['bathroom','Bathroom drain (slow sink, tub, or toilet)'],
  ['floor','Floor drain / laundry drain'],
  ['multiple','Multiple drains (whole-house issue)']
];
const SYMPTOMS = [
  ['slow','Slow drain (minor — taking longer than usual)'],
  ['blockage','Complete blockage (nothing draining)'],
  ['sewage','Sewage backup or odor (emergency)'],
  ['gurgling','Gurgling / bubbling (venting issue possible)'],
  ['recurring','Recurring clog (cleared before, came back)']
];
const SERVICES = [
  ['snake','Drain snaking only (mechanical clearing)'],
  ['hydro','Hydro-jetting (high-pressure water — best for grease/roots)'],
  ['camera','Camera inspection only (diagnose before deciding)'],
  ['snake_cam','Snaking + camera inspection'],
  ['emergency','Emergency service (same day / after hours)']
];
const REGIONS = [
  ['south','South FL (Miami, Ft. Lauderdale, Palm Beach)',1.20],
  ['tampa','Tampa Bay (Tampa, St. Pete, Clearwater)',1.00],
  ['jax','Jacksonville / NE FL',0.93],
  ['sw','SW FL (Naples, Fort Myers, Sarasota)',1.12],
  ['pan','Panhandle (Pensacola, Tallahassee, Panama City)',0.90]
];
const COSTS = {
  snake_bathroom:[100,250],snake_kitchen:[100,250],snake_floor:[100,250],
  snake_main:[200,400],snake_multiple:[200,400],
  hydro_kitchen:[250,500],hydro_bathroom:[250,500],hydro_floor:[250,500],
  hydro_main:[350,700],hydro_multiple:[350,700],
  camera:[150,350],
  snake_cam_bathroom:[300,600],snake_cam_kitchen:[300,600],snake_cam_floor:[300,600],
  snake_cam_main:[300,600],snake_cam_multiple:[300,600],
  emergency:[200,500],recurring:[200,500]
};
const CHECK_ITEMS = [
  'Identified scope — single drain or whole-house / main line issue',
  'Checked if sewage backup present (emergency vs non-emergency)',
  'Confirmed FL-licensed plumber scheduled (verify at myfloridalicense.com)',
  'Chose service: snaking / hydro-jet / camera / combination',
  'All fixtures turned off before plumber arrives',
  'Access to clean-out or drain location confirmed',
  'Plumber snaked or hydro-jetted drain line',
  'Blockage fully cleared — confirmed with water flow test',
  'Camera inspection completed (if selected or if recurring)',
  'Camera report received — pipe condition documented',
  'Any identified pipe damage (root/belly/offset) assessed for repair',
  'Preventive maintenance plan established for future'
];
const PROCS = [
  ['Identify the Scope','One slow drain = localized clog. Multiple slow drains = main line issue. Gurgling when flushing = venting or main line. Sewage smell = sewer gas / backup. Single-drain problems often resolve with snaking; multi-drain problems usually need main line service.'],
  ['Choose Your Service','For grease clogs (kitchen) — hydro-jetting. For hair/soap (bathroom) — snaking. For roots or recurring problems — camera + hydro-jet. For diagnosis on older homes — camera inspection first, then decide.'],
  ['Emergency Protocol','If you have sewage backup (raw sewage coming up from drains) — stop using all water immediately, call a FL licensed plumber, and do not attempt DIY. Raw sewage is a health hazard. After-hours emergency service is available from most FL plumbers 24/7.'],
  ['During the Service','Plumber uses a motorized snake (50–100 ft cable) or hydro-jet (3,000–4,000 PSI water) to clear the line. Camera inspection involves a waterproof camera threaded into the pipe — you can watch on a monitor. Ask for a video recording if possible.'],
  ['Preventive Maintenance','Schedule annual or bi-annual drain maintenance for FL homes 20+ years old, homes with large trees nearby, or properties with history of slow drains. Ask about enzyme treatments for grease management between service calls.']
];
const FACTS = [
  ['FL Root Intrusion','FL has the highest rate of root intrusion in sewer lines of any US state. Year-round growing season means tree roots (live oak, ficus, Brazilian pepper, palm) grow continuously. Roots enter through joint cracks and expand to completely fill pipes over 2–5 years. Root clearing should be done every 1–2 years in older FL neighborhoods.'],
  ['Kitchen Drain Frequency','FL kitchen drains clog 60% more frequently than national average due to year-round cooking patterns, higher grease loads from outdoor entertaining, and warm temperatures that accelerate grease solidification inside pipes. Hydro-jetting removes grease coating from pipe walls — snaking only punches a hole.'],
  ['Pipe Age & Material','FL homes built before 1985 often have cast iron or clay sewer pipes — prone to corrosion, offset joints, and root intrusion. Homes 1985–2005 often have ABS or PVC — better but still vulnerable to root intrusion. Camera inspection is essential for homes 30+ years old with any drain problems.'],
  ['High Water Table','FL’s high water table (especially South FL, where groundwater is often 2–5 feet below surface) means saturated soil puts hydrostatic pressure on sewer pipes, accelerating joint failure. A “pipe belly” (sag where sewage pools) is common in FL slab-on-grade homes — only visible with camera inspection.'],
  ['FL Health Code','FL Health Code (FS 386.041) classifies sewage backup as a public health nuisance. FL property owners are legally required to repair sewage overflow conditions promptly. Rental properties must maintain functional drains — tenant code enforcement complaints can escalate to county health department.']
];

function mk(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
}
function setTab(t) {
  S.tab = t;
  [0,1,2].forEach(i => document.getElementById('tb'+i).classList.toggle('active',i===t));
  render();
}
function showToast() {
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}
function calcCost() {
  const d = S.answers;
  const reg = REGIONS.find(r => r[0] === d.region);
  const mult = reg ? reg[2] : 1.0;
  let key = '';
  if (d.service === 'camera') key = 'camera';
  else if (d.service === 'emergency') key = 'emergency';
  else if (d.symptom === 'recurring') key = 'recurring';
  else if (d.service === 'snake') key = 'snake_' + (d.drain || 'bathroom');
  else if (d.service === 'hydro') key = 'hydro_' + (d.drain || 'kitchen');
  else if (d.service === 'snake_cam') key = 'snake_cam_' + (d.drain || 'main');
  const base = COSTS[key] || [150,400];
  let lo = Math.round(base[0] * mult / 5) * 5;
  let hi = Math.round(base[1] * mult / 5) * 5;
  if (d.symptom === 'sewage' || d.service === 'emergency') { lo += 100; hi += 250; }
  return {lo, hi, regName: reg ? reg[1] : ''};
}
function submitLead(e) {
  e.preventDefault();
  showToast();
}
function renderLeadForm(app) {
  const wrap = mk('div','card lead-form');
  wrap.appendChild(mk('div','form-title','📞 Get a Free Quote — FL Licensed Plumber'));
  const row = mk('div','form-row');
  const ni = document.createElement('input');
  ni.className='form-input'; ni.type='text'; ni.placeholder='Your name'; ni.autocomplete='name';
  const pi = document.createElement('input');
  pi.className='form-input'; pi.type='tel'; pi.placeholder='(561) 555-PIPE'; pi.autocomplete='tel';
  const btn = mk('button','form-btn','Call Me');
  btn.type='button'; btn.onclick = submitLead;
  row.appendChild(ni); row.appendChild(pi); wrap.appendChild(row); wrap.appendChild(btn);
  app.appendChild(wrap);
}
function renderOptions(app, lbl, title, opts, key, next) {
  app.appendChild(mk('div','step-label',lbl));
  app.appendChild(mk('div','step-title',title));
  const div = mk('div','options');
  opts.forEach(([val, txt]) => {
    const btn = mk('button','opt-btn'+(S.answers[key]===val?' sel':''),txt);
    btn.onclick = () => {
      S.answers[key] = val;
      S.step = (next === 'result') ? 5 : next;
      render();
    };
    div.appendChild(btn);
  });
  app.appendChild(div);
}
function renderStep(app) {
  const pw = mk('div','prog-wrap');
  const pb = mk('div','prog-bar'); const pf = mk('div','prog-fill');
  pf.style.width = ((S.step-1)/4*100)+'%';
  pb.appendChild(pf); pw.appendChild(pb);
  pw.appendChild(mk('div','prog-text','Step '+S.step+' of 4'));
  app.appendChild(pw);
  if (S.step===1) renderOptions(app,'Step 1 of 4','Which drain has the problem?',DRAINS,'drain',2);
  else if (S.step===2) renderOptions(app,'Step 2 of 4',"What's the main symptom?",SYMPTOMS,'symptom',3);
  else if (S.step===3) renderOptions(app,'Step 3 of 4','What service is needed?',SERVICES,'service',4);
  else if (S.step===4) renderOptions(app,'Step 4 of 4','Your FL Region:',REGIONS.map(r=>[r[0],r[1]]),'region','result');
  if (S.step > 1) {
    const back = mk('button','back-btn','← Back');
    back.onclick = () => { S.step--; render(); };
    app.appendChild(back);
  }
}
function renderAlerts(app) {
  const d = S.answers;
  if (d.symptom === 'sewage') {
    const c = mk('div','card card-red');
    c.appendChild(mk('div','card-title ct-red','🚨 Sewage Backup — Health Emergency'));
    c.appendChild(mk('p','card-body','Sewage backup is a health emergency — raw sewage contains dangerous pathogens. Call immediately. FL plumbers are available 24/7 for emergency service. Do not use any water fixtures until resolved.'));
    app.appendChild(c);
  }
  if (d.symptom === 'recurring') {
    const c = mk('div','card card-orange');
    c.appendChild(mk('div','card-title ct-orange','⚠️ Recurring Clog Warning'));
    c.appendChild(mk('p','card-body','Recurring clogs often indicate a deeper problem: root intrusion, pipe sag, offset joint, or pipe degradation. A camera inspection before re-snaking is strongly recommended to avoid repeat service calls.'));
    app.appendChild(c);
  }
  if (d.service === 'hydro' || d.service === 'snake_cam') {
    const c = mk('div','card card-gold');
    c.appendChild(mk('div','card-title ct-gold','💡 Hydro-Jetting Advantage'));
    c.appendChild(mk('p','card-body','Hydro-jetting is 4x more effective than snaking for grease clogs — it removes the grease coating from pipe walls entirely, not just punches a hole through the blockage.'));
    app.appendChild(c);
  }
  if (d.drain === 'main' || d.drain === 'multiple') {
    const c = mk('div','card card-teal');
    c.appendChild(mk('div','card-title ct-teal','🌳 FL Main Sewer Line Fact'));
    c.appendChild(mk('p','card-body','FL main sewer lines run an average of 50–100 feet from house to street. Tree root intrusion from live oaks, ficus, and palms is the #1 cause of FL sewer line clogs year-round.'));
    app.appendChild(c);
  }
}
function renderResult(app) {
  const {lo, hi, regName} = calcCost();
  const d = S.answers;
  const card = mk('div','card');
  const cw = mk('div','cost-wrap');
  cw.appendChild(mk('div','cost-lbl','Estimated Cost Range'));
  cw.appendChild(mk('div','cost-amt','$'+lo+'–$'+hi));
  cw.appendChild(mk('div','cost-reg',regName));
  card.appendChild(cw);
  const svc = SERVICES.find(s=>s[0]===d.service);
  if (svc) card.appendChild(mk('div','cost-svc','Service: '+svc[1]));
  app.appendChild(card);
  renderAlerts(app);
  renderLeadForm(app);
  const rst = mk('button','reset-btn','↩ Start Over');
  rst.onclick = () => { S.step=1; S.answers={}; render(); };
  app.appendChild(rst);
}
function renderTab1(app) {
  if (S.step < 5) renderStep(app);
  else renderResult(app);
}
function renderFacts(app) {
  app.appendChild(mk('div','sec-hdr','📍 5 Florida Drain & Sewer Facts'));
  FACTS.forEach((f,i) => {
    const c = mk('div','fact-card');
    c.appendChild(mk('div','fact-num','Fact '+(i+1)+' — '+f[0]));
    c.appendChild(mk('div','fact-text',f[1]));
    app.appendChild(c);
  });
}
function makeTblHead(cols) {
  const thead = document.createElement('thead');
  const tr = document.createElement('tr');
  cols.forEach(c => { const th = document.createElement('th'); th.textContent=c; tr.appendChild(th); });
  thead.appendChild(tr); return thead;
}
function makeTblBody(rows) {
  const tbody = document.createElement('tbody');
  rows.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => { const td = document.createElement('td'); td.textContent=cell; tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  return tbody;
}
function renderDrainTable(app) {
  app.appendChild(mk('div','sec-hdr','Drain Problem Comparison'));
  const wrap = mk('div','tbl-wrap'); const tbl = mk('table','tbl');
  tbl.appendChild(makeTblHead(['Problem','Cause','Best Fix','Recurrence Risk','Camera Needed']));
  tbl.appendChild(makeTblBody([
    ['Kitchen Grease','Cooking oils solidify on walls','Hydro-jetting','High without hydro-jet','Recommended'],
    ['Bathroom Hair/Soap','Hair & soap scum buildup','Snaking','Moderate','Not usually needed'],
    ['Root Intrusion','Roots enter joint cracks','Hydro-jet + root kill','Very High','Yes — essential'],
    ['Pipe Belly','Soil movement causes sag','Pipe repair/re-slope','Constant','Yes — only way to see'],
    ['Pipe Collapse','Corrosion or ground shift','Pipe replacement','N/A — permanent','Yes — confirms extent'],
    ['Offset Joint','Ground movement shifts pipe','Pipe realignment','High','Yes — confirms location']
  ]));
  wrap.appendChild(tbl); app.appendChild(wrap);
}
function renderMethodTable(app) {
  app.appendChild(mk('div','sec-hdr','Snaking vs. Hydro-Jetting'));
  const wrap = mk('div','tbl-wrap'); const tbl = mk('table','tbl');
  tbl.appendChild(makeTblHead(['Method','Best For','Removes Root?','Clears Grease?','Cost','Lasting?']));
  tbl.appendChild(makeTblBody([
    ['Snaking','Hair, soft clogs, general','Partially','No (punches hole)','$100–400','6–24 months'],
    ['Hydro-jetting','Grease, roots, full clean','Yes (removes)','Yes (scours walls)','$250–700','2–5 years']
  ]));
  wrap.appendChild(tbl); app.appendChild(wrap);
}
function renderGuideCards(app) {
  const oc = mk('div','card card-orange');
  oc.appendChild(mk('div','card-title ct-orange','🌳 FL Tree Root Warning'));
  oc.appendChild(mk('p','card-body','If you have live oak, ficus, or large shade trees within 20 feet of your sewer line and you’ve never had a camera inspection, schedule one now. Root intrusion discovered early (hair-sized roots) costs $200–400 to clear. Advanced root intrusion (full blockage) runs $1,500–8,000+ with possible pipe lining or replacement.'));
  app.appendChild(oc);
  const tc = mk('div','card card-teal');
  tc.appendChild(mk('div','card-title ct-teal','🔩 FL Pipe Material Guide'));
  tc.appendChild(mk('p','card-body','Cast iron (pre-1975): 50+ years old, corrosion likely. Orangeburg (pre-1970): replace immediately if found. Clay tile: 50+ years, root-prone. ABS (1975–2000): durable, root-resistant. PVC (1990-present): best, very root-resistant. Schedule a camera to know exactly what pipe material you have.'));
  app.appendChild(tc);
}
function renderTab2(app) {
  renderFacts(app);
  renderDrainTable(app);
  renderMethodTable(app);
  renderGuideCards(app);
}
function renderProcessCards(app) {
  PROCS.forEach((p,i) => {
    const c = mk('div','proc-card');
    c.appendChild(mk('div','proc-num','Step '+(i+1)));
    c.appendChild(mk('div','proc-title',p[0]));
    c.appendChild(mk('div','proc-body',p[1]));
    app.appendChild(c);
  });
  const gc = mk('div','card card-gold');
  gc.appendChild(mk('div','card-title ct-gold','⚖️ FL Licensing Requirement'));
  gc.appendChild(mk('p','card-body','Drain cleaning services must be performed by FL-licensed plumbers (CFC or CPC license) when work involves sewer system components. Snaking a drain is a “plumbing service” under FS 489.105(3)(m). Verify license at myfloridalicense.com before hiring.'));
  app.appendChild(gc);
}
function renderChecklist(app) {
  const done = S.checks.filter(Boolean).length;
  app.appendChild(mk('div','sec-hdr','✅ Service Checklist ('+done+'/12)'));
  const gw = mk('div','gprog-wrap');
  const gb = mk('div','gprog-bg'); const gf = mk('div','gprog-fill');
  gf.style.width = (done/12*100)+'%'; gb.appendChild(gf); gw.appendChild(gb);
  gw.appendChild(mk('div','gprog-lbl',Math.round(done/12*100)+'% complete'));
  app.appendChild(gw);
  const cl = mk('div','check-list');
  CHECK_ITEMS.forEach((txt, i) => {
    const item = mk('div','check-item');
    item.setAttribute('role','checkbox');
    item.setAttribute('aria-checked', S.checks[i] ? 'true' : 'false');
    item.onclick = () => { S.checks[i] = !S.checks[i]; render(); };
    const box = mk('div','check-box'+(S.checks[i]?' done':''), S.checks[i]?'✓':'');
    const ctxt = mk('div','check-txt'+(S.checks[i]?' done':''), txt);
    item.appendChild(box); item.appendChild(ctxt); cl.appendChild(item);
  });
  app.appendChild(cl);
}
function renderTab3(app) {
  renderProcessCards(app);
  renderChecklist(app);
  renderLeadForm(app);
}
function render() {
  const app = document.getElementById('app');
  while (app.firstChild) app.removeChild(app.firstChild);
  if (S.tab === 0) renderTab1(app);
  else if (S.tab === 1) renderTab2(app);
  else renderTab3(app);
}
render();
</script>
</body>
</html>
