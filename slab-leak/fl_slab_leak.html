<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FL Slab Leak Detection &amp; Repair Cost Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;--card:#0F1629;--cd:#141929;
  --blue:#00B4FF;--gold:#F4B942;--orange:#F97316;
  --red:#EF4444;--green:#22C55E;--teal:#14B8A6;
  --text:#E2E8F0;--muted:#94A3B8;--bdr:rgba(255,255,255,0.08)
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;padding:14px 12px 90px}
.hdr{text-align:center;padding:20px 0 16px}
.hdr-icon{font-size:2rem;display:block;margin-bottom:6px}
.hdr h1{font-size:1.1rem;color:var(--blue);line-height:1.35;font-weight:800}
.hdr p{color:var(--muted);font-size:0.74rem;margin-top:5px}
.hdr-badges{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.tabs{display:flex;gap:3px;background:var(--cd);border-radius:12px;padding:4px;margin-bottom:14px}
.tab-btn{flex:1;padding:9px 3px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-size:0.68rem;font-weight:700;cursor:pointer;transition:all .2s;line-height:1.3;letter-spacing:0.01em}
.tab-btn.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,180,255,.25)}
.card{background:var(--card);border-radius:12px;padding:15px;margin-bottom:12px;border:1px solid var(--bdr)}
.c-gold{border-left:3px solid var(--gold)}
.c-orange{border-left:3px solid var(--orange)}
.c-red{border-left:3px solid var(--red)}
.c-teal{border-left:3px solid var(--teal)}
.c-green{border-left:3px solid var(--green)}
.c-blue{border-left:3px solid var(--blue)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.67rem;font-weight:800;letter-spacing:0.03em}
.b-blue{background:rgba(0,180,255,.12);color:var(--blue)}
.b-gold{background:rgba(244,185,66,.12);color:var(--gold)}
.b-orange{background:rgba(249,115,22,.12);color:var(--orange)}
.b-red{background:rgba(239,68,68,.12);color:var(--red)}
.b-teal{background:rgba(20,184,166,.12);color:var(--teal)}
.b-green{background:rgba(34,197,94,.12);color:var(--green)}
.b-muted{background:rgba(148,163,184,.1);color:var(--muted)}
h2{font-size:0.93rem;font-weight:800;margin-bottom:8px}
h3{font-size:0.82rem;font-weight:700;margin-bottom:4px}
p{font-size:0.8rem;line-height:1.58;color:var(--muted)}
strong{font-weight:700}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}
/* Step bar */
.step-bar{display:flex;gap:5px;margin-bottom:14px}
.s-dot{flex:1;height:4px;border-radius:2px;background:var(--bdr);transition:background .35s}
.s-dot.done{background:var(--green)}.s-dot.cur{background:var(--blue)}
.step-lbl{font-size:0.71rem;color:var(--blue);margin-bottom:10px;text-align:center;font-weight:600}
/* Options */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;background:var(--cd);border:1.5px solid var(--bdr);border-radius:10px;cursor:pointer;text-align:left;color:var(--text);width:100%;transition:all .2s;font-family:inherit}
.opt:hover{border-color:rgba(0,180,255,.4);background:rgba(0,180,255,.04)}
.opt.sel{border-color:var(--blue);background:rgba(0,180,255,.08);box-shadow:0 0 0 1px rgba(0,180,255,.2)}
.opt-ico{font-size:1.15rem;flex-shrink:0;margin-top:1px}
.opt-txt{font-size:0.82rem;line-height:1.4;font-weight:500}
.opt-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;display:block}
/* Cost result */
.cost-hero{background:linear-gradient(135deg,rgba(0,180,255,.08),rgba(0,180,255,.03));border-radius:12px;padding:18px 16px;text-align:center;margin-bottom:10px;border:1px solid rgba(0,180,255,.15)}
.cost-num{font-size:1.85rem;font-weight:900;color:var(--blue);text-align:center;letter-spacing:-0.03em;line-height:1}
.cost-lbl{font-size:0.7rem;color:var(--muted);text-align:center;margin-top:5px}
.cost-note{font-size:0.72rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
/* Nav */
.nav{display:flex;gap:8px;margin-top:14px}
.btn-back{flex:1;padding:11px;border-radius:9px;background:var(--cd);color:var(--muted);border:1px solid var(--bdr);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-back:hover{opacity:.75}
.btn-next{flex:1.5;padding:11px;border-radius:9px;background:var(--blue);color:#fff;border:none;font-size:0.84rem;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .2s;box-shadow:0 2px 10px rgba(0,180,255,.25)}
.btn-next:disabled{opacity:0.3;cursor:default;box-shadow:none}
.btn-next:not(:disabled):hover{opacity:.88}
.btn-rst{width:100%;padding:10px;background:transparent;color:var(--muted);border:1px solid var(--bdr);border-radius:9px;font-size:0.79rem;cursor:pointer;margin-top:8px;font-family:inherit;transition:opacity .2s}
.btn-rst:hover{opacity:.7}
/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:0.72rem;margin-top:8px}
.tbl th{background:var(--cd);color:var(--muted);padding:6px 7px;text-align:left;font-weight:800;font-size:0.65rem;letter-spacing:.05em;text-transform:uppercase}
.tbl td{padding:8px 7px;border-bottom:1px solid var(--bdr);vertical-align:top;color:var(--text);line-height:1.4}
.tbl tr:last-child td{border-bottom:none}
.tbl td:first-child{font-weight:700;color:var(--blue)}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
/* Facts */
.fact-row{display:flex;gap:11px;align-items:flex-start;padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--bdr)}
.fact-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.f-num{width:26px;height:26px;border-radius:50%;background:rgba(0,180,255,.12);color:var(--blue);font-size:0.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(0,180,255,.2)}
/* Process cards */
.pc{background:var(--cd);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;border:1px solid var(--bdr)}
.p-num{width:26px;height:26px;border-radius:50%;color:#fff;font-size:0.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
/* Checklist */
.prog-wrap{margin:10px 0 14px}
.prog-track{height:7px;background:var(--cd);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),#fb923c);border-radius:4px;transition:width .45s ease}
.prog-lbl{font-size:0.7rem;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between}
.ci{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.ci:last-child{border-bottom:none}
.ci:hover{opacity:.8}
.cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0px;transition:all .2s}
.cb.ck{background:var(--orange);border-color:var(--orange)}
.ci-lbl{font-size:0.8rem;line-height:1.47;color:var(--text)}
.ci.ck .ci-lbl{text-decoration:line-through;color:var(--muted);opacity:.6}
/* Lead form */
.fg{margin-bottom:9px}
label{display:block;font-size:0.71rem;color:var(--muted);margin-bottom:4px;font-weight:700;letter-spacing:.02em}
input[type=text],input[type=tel]{width:100%;padding:11px 12px;background:var(--cd);border:1.5px solid var(--bdr);border-radius:9px;color:var(--text);font-size:0.86rem;outline:none;transition:border-color .2s;font-family:inherit}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,180,255,.1)}
input::placeholder{color:rgba(148,163,184,.5)}
.btn-cta{width:100%;padding:14px;background:var(--gold);color:#0A0E1A;font-weight:900;font-size:0.9rem;border:none;border-radius:10px;cursor:pointer;margin-top:6px;transition:all .2s;letter-spacing:.02em;font-family:inherit;box-shadow:0 4px 14px rgba(244,185,66,.3)}
.btn-cta:hover{opacity:.9;box-shadow:0 6px 18px rgba(244,185,66,.4)}
.btn-cta:active{transform:scale(.98)}
/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--gold);color:#0A0E1A;padding:13px 24px;border-radius:12px;font-weight:900;font-size:0.85rem;white-space:nowrap;transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(244,185,66,.4)}
#toast.show{transform:translateX(-50%) translateY(0)}
/* Divider */
.div{height:1px;background:var(--bdr);margin:4px 0 12px}
/* Info rows */
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:0.78rem}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:var(--muted)}
.info-row .val{color:var(--text);font-weight:600}
/* Overflow wrapper */
.ov{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* Responsive */
@media(max-width:375px){
  #app{padding:10px 8px 80px}
  .cost-num{font-size:1.55rem}
  .tab-btn{font-size:0.62rem;padding:8px 2px}
  .hdr h1{font-size:1rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast">&#x2705; We'll call you within 2 hours!</div>
<script>
'use strict';

/* ---- STATE ---- */
var S = {
  tab: 0,
  step: 0,
  answers: {},
  checks: [false,false,false,false,false,false,false,false,false,false,false,false]
};

/* ---- XSS-SAFE ESCAPE ---- */
var esc = function(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};

var $ = function(id) { return document.getElementById(id); };

/* ---- WIZARD DATA ---- */
var STEPS = [
  {
    lbl: 'Step 1 of 4 — How did you discover the slab leak?',
    key: 'disc',
    opts: [
      { v:'bill',   i:'💧', t:'Water bill spike',          s:'Sudden 30–50% increase' },
      { v:'hot',    i:'🦶', t:'Hot spot on floor',          s:'Warm area when walking' },
      { v:'sound',  i:'👂', t:'Sound of running water',     s:'Heard when all fixtures off' },
      { v:'crack',  i:'🏗', t:'Foundation crack / settling', s:'' },
      { v:'wet',    i:'🪣', t:'Wet carpet / flooring buckling', s:'' },
      { v:'diag',   i:'✅', t:'Professional detection',      s:'Already diagnosed by a plumber' }
    ]
  },
  {
    lbl: 'Step 2 of 4 — What type of pipe is leaking?',
    key: 'pipe',
    opts: [
      { v:'hot',     i:'🔴', t:'Hot water line (under slab)',     s:'' },
      { v:'cold',    i:'🔵', t:'Cold water line (under slab)',    s:'' },
      { v:'sewer',   i:'🟤', t:'Sewer / drain line (under slab)', s:'Higher urgency — foundation risk' },
      { v:'unknown', i:'❓', t:'Unknown / need detection first',   s:'' }
    ]
  },
  {
    lbl: 'Step 3 of 4 — What repair method is preferred?',
    key: 'meth',
    opts: [
      { v:'spot',    i:'🔨', t:'Spot repair',       s:'Jackhammer, fix, repour — most affordable for single leak' },
      { v:'reroute', i:'↗',  t:'Pipe rerouting',    s:'New line through walls/attic — avoids slab disruption' },
      { v:'epoxy',   i:'💉', t:'Epoxy pipe lining',  s:'Cure-in-place lining — trenchless, premium option' },
      { v:'repipe',  i:'🔧', t:'Full repipe',        s:'Replace all supply lines — for multiple leaks or old pipe' }
    ]
  },
  {
    lbl: 'Step 4 of 4 — Your Florida region:',
    key: 'reg',
    opts: [
      { v:'south', i:'🌴', t:'South FL (Miami-Dade, Broward, Palm Beach)', s:'Highest cost area', m:1.20 },
      { v:'tampa', i:'⛱', t:'Tampa Bay (Hillsborough, Pinellas, Pasco)',  s:'Baseline market',    m:1.0  },
      { v:'jax',   i:'🏙', t:'Jacksonville / NE Florida',                  s:'Below-average cost', m:0.92 },
      { v:'sw',    i:'🦩', t:'SW Florida (Naples, Fort Myers, Sarasota)',  s:'',                   m:1.12 },
      { v:'pan',   i:'🎣', t:'Panhandle (Pensacola, Tallahassee)',         s:'Most affordable area', m:0.88 }
    ]
  }
];

/* ---- COST DATA ---- */
var COSTS = {
  detection: [150, 400],
  spot:   { hot:[1500,4500], cold:[1500,4500], sewer:[2500,6000],  unknown:[1500,4500] },
  reroute:{ hot:[2000,5000], cold:[2000,5000], sewer:[3500,8000],  unknown:[2000,5000] },
  epoxy:  { hot:[3000,7000], cold:[3000,7000], sewer:[3000,7000],  unknown:[3000,7000] },
  repipe: [5000, 15000]
};

/* ---- FACTS DATA ---- */
var FACTS = [
  {
    n: 1,
    title: 'Highest Slab Leak Rate in the US',
    txt: 'FL has aggressive soil chemistry (pH 4–6 acidic), a high water table causing pipe movement, hard water mineral corrosion, and copper pipe electrolysis in sandy soil — a perfect storm for slab leaks.'
  },
  {
    n: 2,
    title: 'Most-Vulnerable Construction Era: 1970–2000',
    txt: 'FL homes built 1970–2000 predominantly use copper supply lines under slabs — the most vulnerable material. Post-2000 construction often uses CPVC or PEX, which are far less prone to slab leaks.'
  },
  {
    n: 3,
    title: 'FL Detection Cost & Licensing (FS 489)',
    txt: 'FL average slab leak detection costs $200–$400 using electronic listening equipment or helium tracer gas. FL plumbers are licensed under Florida Statute 489 and may legally perform professional leak detection.'
  },
  {
    n: 4,
    title: 'Homeowners Insurance: File on Discovery Date',
    txt: 'Sudden slab leaks are often covered under the “sudden and accidental” clause of HO-3 policies — the most common FL policy type. Gradual damage is explicitly excluded. Always file your claim on the day you discover the leak.'
  },
  {
    n: 5,
    title: 'South FL Has the Highest Copper Corrosion Rate',
    txt: 'Miami-Dade, Broward, and Palm Beach counties have the highest copper pipe corrosion rates in FL — driven by salt air, acidic soil (pH as low as 4), and hard water interaction combining to accelerate electrolysis.'
  }
];

/* ---- DETECTION METHODS ---- */
var DET = [
  ['Electronic Listening', '$150–300',   'Non-invasive',      '~80% accurate',        'Most common method'],
  ['Thermal Imaging',      '$200–400',   'Non-invasive',      'Hot water only',        'Shows floor temp change'],
  ['Helium Tracer Gas',    '$250–450',   'Non-invasive',      'Highest accuracy',      'Finds any pipe type'],
  ['Pressure Testing',     '$100–200',   'Non-invasive',      'Confirms leak, no loc', 'Starting point only'],
  ['Jackhammer Search',    '$500–1,500', 'Destructive',       '100% if found',         'Last resort only'],
  ['Video Inspection',     '$150–350',   'Camera in drain',   'Very accurate',         'Sewer/drain lines only']
];

/* ---- REPAIR COMPARISON ---- */
var REP = [
  ['Spot Repair',    '$1,500–6,000',    'High — slab opened',     '5–10 yr on pipe',  'Single localized leak, newer pipes'],
  ['Pipe Rerouting', '$2,000–8,000',    'Low — walls/attic',      '25+ yr (new pipe)',     'Inaccessible or older copper lines'],
  ['Epoxy Lining',   '$3,000–7,000',    'Minimal — trenchless',   '10–50 yr',         'Minimal disruption required'],
  ['Full Repipe',    '$5,000–15,000+',  'High — full access',     '25–50 yr',         'Multiple leaks or outdated pipes']
];

/* ---- PROCESS STEPS ---- */
var PROCS = [
  {
    c: 'var(--blue)',
    t: '1. Detect',
    d: 'Shut off all water and watch your meter for 15 minutes. Any movement = active leak. Call a FL licensed plumber (FS 489) for professional electronic detection using listening equipment or helium tracer gas.'
  },
  {
    c: 'var(--gold)',
    t: '2. Diagnose',
    d: 'Determine pipe type (hot/cold/sewer), approximate location, and leak extent. Request a written detection report with exact location — this document is required for your homeowners insurance claim.'
  },
  {
    c: 'var(--orange)',
    t: '3. Choose Repair Method',
    d: 'Spot repair for single localized leaks on newer pipes. Rerouting for inaccessible or older copper lines. Epoxy lining for minimal disruption. Full repipe if multiple leaks or severely degraded pipes are found.'
  },
  {
    c: 'var(--teal)',
    t: '4. File Insurance',
    d: 'File your homeowners insurance claim the same day as diagnosis. Provide the written detection report. FL Citizens Insurance and most HO-3 policies cover sudden slab leaks — not gradual damage. Note the discovery date precisely.'
  },
  {
    c: 'var(--green)',
    t: '5. Repair & Restore',
    d: 'Licensed FL plumber performs the repair. A permit is required for any slab penetration under Florida Building Code Chapter 6. Re-test pipe pressure (minimum 100 PSI) before closing the slab opening.'
  }
];

/* ---- CHECKLIST ITEMS ---- */
var CHECKS = [
  'Shut off main water supply and check meter (15 min test)',
  'Document discovery date and all symptoms (for insurance)',
  'Call FL licensed plumber (FS 489) for electronic detection',
  'Received written detection report with exact leak location',
  'Contacted homeowner’s insurance to file claim',
  'Selected repair method (spot / reroute / epoxy / repipe)',
  'Got 2–3 written quotes from FL licensed plumbers',
  'Plumber pulled repair permit with local building department',
  'Slab opened / repair access prepared as needed',
  'Pipe repaired and pressure-tested (holds 100 PSI for 1 hr)',
  'Building inspection passed and permit closed',
  'Slab restored, flooring or tile reinstalled and dried'
];

/* ===== HELPERS ===== */

function showToast() {
  var t = $('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3800);
}

function chkSVG() {
  return '<svg width="12" height="9" viewBox="0 0 12 9" fill="none">'
       + '<path d="M1 4.5L4.5 8L11 1" stroke="#0A0E1A" stroke-width="2.2"'
       + ' stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString();
}

function calcCost() {
  var p = S.answers.pipe || 'hot';
  var m = S.answers.meth;
  var regOpt = null;
  var ropts = STEPS[3].opts;
  for (var i = 0; i < ropts.length; i++) {
    if (ropts[i].v === S.answers.reg) { regOpt = ropts[i]; break; }
  }
  var mult = regOpt ? regOpt.m : 1.0;
  var range;
  if (!m) {
    range = COSTS.detection;
  } else if (m === 'repipe') {
    range = COSTS.repipe;
  } else if (COSTS[m]) {
    range = COSTS[m][p] || COSTS[m].hot || COSTS.detection;
  } else {
    range = COSTS.detection;
  }
  return {
    lo:    fmtMoney(range[0] * mult),
    hi:    fmtMoney(range[1] * mult),
    sewer: (p === 'sewer'),
    meth:  m
  };
}

/* ===== LEAD FORM ===== */

function leadFormHTML(id) {
  return '<div class="card c-gold">'
    + '<div class="badge b-gold" style="margin-bottom:8px">🚨 FREE ESTIMATE — NO OBLIGATION</div>'
    + '<h2 style="color:var(--gold)">Talk to a FL Licensed Plumber</h2>'
    + '<p class="mt1">We match you with FS 489-licensed FL plumbers who specialize in slab leaks. '
    + 'Average response time: <strong style="color:var(--gold)">under 2 hours</strong>. No pressure, no commitment.</p>'
    + '<form id="lf-' + id + '" style="margin-top:13px" onsubmit="handleLead(event, \'' + id + '\')">'
    + '<div class="fg">'
    + '<label>Your Name</label>'
    + '<input type="text" id="ln-' + id + '" placeholder="John Smith" maxlength="60" autocomplete="name" required>'
    + '</div>'
    + '<div class="fg">'
    + '<label>Phone Number</label>'
    + '<input type="tel" id="lp-' + id + '" placeholder="(561) 555-PIPE" maxlength="20" autocomplete="tel" required>'
    + '</div>'
    + '<button type="submit" class="btn-cta">📞 Get My Free Estimate →</button>'
    + '</form>'
    + '<p class="mt2" style="font-size:.7rem;text-align:center">🔒 Your info is private. We never sell your data.</p>'
    + '</div>';
}

function handleLead(e, id) {
  e.preventDefault();
  var nm = $('ln-' + id);
  var ph = $('lp-' + id);
  if (!nm || !ph || !nm.value.trim() || !ph.value.trim()) return;
  showToast();
  var form = $('lf-' + id);
  if (form) {
    var msg = document.createElement('div');
    msg.style.cssText = 'padding:12px;background:rgba(244,185,66,.08);border-radius:8px;margin-top:8px;border:1px solid rgba(244,185,66,.2)';
    var p1 = document.createElement('p');
    p1.style.cssText = 'color:var(--gold);font-weight:800;font-size:.86rem;margin-bottom:4px';
    p1.textContent = '✅ Request received!';
    var p2 = document.createElement('p');
    p2.style.cssText = 'color:var(--muted);font-size:.78rem';
    p2.textContent = 'A licensed FL plumber will call you within 2 hours during business hours.';
    msg.appendChild(p1);
    msg.appendChild(p2);
    form.replaceWith(msg);
  }
}

/* ===== TAB 1: COST WIZARD ===== */

function buildWizard() {
  var d = STEPS[S.step];
  var h = '<div class="step-bar">';
  for (var i = 0; i < 4; i++) {
    var cls = i < S.step ? ' done' : (i === S.step ? ' cur' : '');
    h += '<div class="s-dot' + cls + '"></div>';
  }
  h += '</div>';
  h += '<div class="step-lbl">' + esc(d.lbl) + '</div>';
  h += '<div class="opts">';
  for (var j = 0; j < d.opts.length; j++) {
    var o = d.opts[j];
    var sel = (S.answers[d.key] === o.v) ? ' sel' : '';
    /* Use data attributes to avoid quote-in-attribute escaping issues */
    h += '<button class="opt' + sel + '"'
       + ' data-k="' + esc(d.key) + '"'
       + ' data-v="' + esc(o.v) + '"'
       + ' onclick="pickOpt(this)">'
       + '<span class="opt-ico">' + o.i + '</span>'
       + '<span>'
       + '<span class="opt-txt">' + esc(o.t) + '</span>'
       + (o.s ? '<span class="opt-sub">' + esc(o.s) + '</span>' : '')
       + '</span>'
       + '</button>';
  }
  h += '</div>';
  h += '<div class="nav">';
  if (S.step > 0) {
    h += '<button class="btn-back" onclick="wizBack()">← Back</button>';
  } else {
    h += '<div style="flex:1"></div>';
  }
  var ok = !!S.answers[d.key];
  var nxt = S.step < 3 ? 'Next →' : 'See My Estimate →';
  h += '<button class="btn-next" onclick="wizNext()"' + (ok ? '' : ' disabled') + '>' + nxt + '</button>';
  h += '</div>';
  return h;
}

function buildResults() {
  var c = calcCost();
  var ropts = STEPS[3].opts;
  var reg = null;
  for (var i = 0; i < ropts.length; i++) {
    if (ropts[i].v === S.answers.reg) { reg = ropts[i]; break; }
  }
  var rn = reg ? reg.t.split('(')[0].trim() : 'Florida';
  var methLabel = {
    spot: 'Spot Repair', reroute: 'Pipe Rerouting',
    epoxy: 'Epoxy Lining', repipe: 'Full Repipe'
  }[c.meth] || 'Detection';
  var pipeLabel = {
    hot: 'Hot Water Line', cold: 'Cold Water Line',
    sewer: 'Sewer/Drain Line', unknown: 'Unknown Pipe Type'
  }[S.answers.pipe] || '';

  var h = '<div class="cost-hero">'
    + '<div class="badge b-blue" style="margin-bottom:10px">ESTIMATED COST RANGE</div>'
    + '<div class="cost-num">' + esc(c.lo) + ' – ' + esc(c.hi) + '</div>'
    + '<div class="cost-lbl">' + esc(rn) + ' Region — region-adjusted estimate</div>'
    + '<div class="cost-note">'
    + '<div class="info-row"><span class="lbl">Method</span><span class="val">' + esc(methLabel) + '</span></div>'
    + (pipeLabel ? '<div class="info-row"><span class="lbl">Pipe Type</span><span class="val">' + esc(pipeLabel) + '</span></div>' : '')
    + '<div class="info-row"><span class="lbl">Region Multiplier</span><span class="val">' + (reg ? reg.m.toFixed(2) : '1.00') + 'x vs Tampa baseline</span></div>'
    + '</div></div>';

  h += '<div class="card c-orange">'
    + '<div class="badge b-orange" style="margin-bottom:6px">⚠️ WATER WASTE ALERT</div>'
    + '<p>The average FL slab leak wastes <strong style="color:var(--orange)">10,000+ gallons/month</strong> — adding'
    + ' <strong style="color:var(--orange)">$200–$400 extra</strong> to your water bill every month.'
    + ' Each day without repair also increases the risk of mold growth and structural damage.</p>'
    + '</div>';

  if (c.sewer) {
    h += '<div class="card c-red">'
      + '<div class="badge b-red" style="margin-bottom:6px">🚨 URGENT — SEWER SLAB LEAK</div>'
      + '<p>Sewer slab leaks risk <strong style="color:var(--red)">foundation undermining</strong> as eroded soil'
      + ' creates voids beneath your slab. This can cause settlement and structural failure.'
      + ' Schedule professional detection <strong style="color:var(--red)">within 48 hours</strong>.</p>'
      + '</div>';
  }

  h += '<div class="card c-gold">'
    + '<div class="badge b-gold" style="margin-bottom:6px">🏠 FL HOMEOWNERS INSURANCE</div>'
    + '<p>Many FL policies (Citizens, Universal, most HO-3) cover <strong style="color:var(--gold)">sudden'
    + ' slab leaks</strong> but <strong style="color:var(--gold)">NOT gradual damage</strong>.'
    + ' Document your discovery date immediately. File on the same day as your professional diagnosis'
    + ' to protect your claim eligibility.</p>'
    + '</div>';

  h += leadFormHTML('t1');
  h += '<button class="btn-rst" onclick="wizRestart()">← Start Over / New Estimate</button>';
  return h;
}

function renderTab1() {
  var el = document.createElement('div');
  if (S.step >= 4) {
    el.innerHTML = buildResults();
  } else {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = buildWizard();
    el.appendChild(card);
  }
  return el;
}

/* Use data attributes on the button to avoid inline quote escaping */
function pickOpt(btn) {
  var k = btn.getAttribute('data-k');
  var v = btn.getAttribute('data-v');
  if (k && v) { S.answers[k] = v; renderAll(); }
}

function wizNext() {
  var d = STEPS[S.step];
  if (!S.answers[d.key]) return;
  S.step++;
  renderAll();
}

function wizBack() {
  if (S.step > 0) { S.step--; renderAll(); }
}

function wizRestart() {
  S.step = 0;
  S.answers = {};
  renderAll();
}

/* ===== TAB 2: FL GUIDE ===== */

function buildFacts() {
  var h = '<div class="card">'
    + '<h2 style="color:var(--blue);margin-bottom:14px">🌴 5 FL Slab Leak Facts Every Homeowner Should Know</h2>';
  for (var i = 0; i < FACTS.length; i++) {
    var f = FACTS[i];
    h += '<div class="fact-row">'
       + '<div class="f-num">' + f.n + '</div>'
       + '<div>'
       + '<h3 style="color:var(--text)">' + esc(f.title) + '</h3>'
       + '<p class="mt1" style="font-size:.79rem">' + esc(f.txt) + '</p>'
       + '</div></div>';
  }
  return h + '</div>';
}

function buildDetTable() {
  var h = '<div class="card">'
    + '<h2 style="color:var(--blue);margin-bottom:2px">🔍 Detection Method Comparison</h2>'
    + '<p style="font-size:.73rem;margin-bottom:6px">FL plumbers use several methods — cost and accuracy vary significantly</p>'
    + '<div class="ov"><table class="tbl">'
    + '<thead><tr><th>Method</th><th>Cost</th><th>Type</th><th>Accuracy</th><th>Notes</th></tr></thead><tbody>';
  for (var i = 0; i < DET.length; i++) {
    var r = DET[i];
    h += '<tr>'
       + '<td>' + esc(r[0]) + '</td>'
       + '<td>' + esc(r[1]) + '</td>'
       + '<td>' + esc(r[2]) + '</td>'
       + '<td>' + esc(r[3]) + '</td>'
       + '<td>' + esc(r[4]) + '</td>'
       + '</tr>';
  }
  return h + '</tbody></table></div></div>';
}

function buildRepTable() {
  var h = '<div class="card">'
    + '<h2 style="color:var(--blue);margin-bottom:2px">🔧 Repair Method Comparison</h2>'
    + '<p style="font-size:.73rem;margin-bottom:6px">Compare methods by cost, disruption, warranty, and best use case</p>'
    + '<div class="ov"><table class="tbl">'
    + '<thead><tr><th>Method</th><th>Cost</th><th>Disruption</th><th>Warranty</th><th>Best For</th></tr></thead><tbody>';
  for (var i = 0; i < REP.length; i++) {
    var r = REP[i];
    h += '<tr>'
       + '<td>' + esc(r[0]) + '</td>'
       + '<td>' + esc(r[1]) + '</td>'
       + '<td>' + esc(r[2]) + '</td>'
       + '<td>' + esc(r[3]) + '</td>'
       + '<td>' + esc(r[4]) + '</td>'
       + '</tr>';
  }
  return h + '</tbody></table></div></div>';
}

function renderTab2() {
  var el = document.createElement('div');
  el.innerHTML = buildFacts() + buildDetTable() + buildRepTable()
    + '<div class="card c-teal">'
    + '<div class="badge b-teal" style="margin-bottom:7px">🏗 FL FOUNDATION RISK ALERT</div>'
    + '<p>Sewer slab leaks pose <strong style="color:var(--teal)">greater foundation risk</strong> than supply line'
    + ' leaks. Eroded soil under the slab creates voids that cause settlement and can compromise structural'
    + ' integrity. Florida Building Code requires a slab repair inspection'
    + ' <strong style="color:var(--teal)">before permit closure</strong> — always ensure your contractor schedules this.</p>'
    + '</div>'
    + '<div class="card c-blue">'
    + '<div class="badge b-blue" style="margin-bottom:7px">📍 FL REGION COST GUIDE</div>'
    + '<div class="div"></div>'
    + '<div class="info-row"><span class="lbl">South FL (Miami, Fort Laud, WPB)</span><span class="val" style="color:var(--orange)">+20% above avg</span></div>'
    + '<div class="info-row"><span class="lbl">SW Florida (Naples, Ft Myers)</span><span class="val" style="color:var(--gold)">+12% above avg</span></div>'
    + '<div class="info-row"><span class="lbl">Tampa Bay (baseline)</span><span class="val" style="color:var(--green)">Market average</span></div>'
    + '<div class="info-row"><span class="lbl">SW Florida (Sarasota)</span><span class="val" style="color:var(--gold)">+12% above avg</span></div>'
    + '<div class="info-row"><span class="lbl">Jacksonville / NE Florida</span><span class="val" style="color:var(--teal)">−8% below avg</span></div>'
    + '<div class="info-row"><span class="lbl">Panhandle (Pensacola, Tallahassee)</span><span class="val" style="color:var(--green)">−12% below avg</span></div>'
    + '</div>';
  return el;
}

/* ===== TAB 3: CHECKLIST ===== */

function buildProcess() {
  var h = '<div class="card">'
    + '<h2 style="color:var(--blue);margin-bottom:12px">📋 The 5-Step FL Slab Leak Process</h2>';
  for (var i = 0; i < PROCS.length; i++) {
    var c = PROCS[i];
    h += '<div class="pc">'
       + '<div class="p-num" style="background:' + c.c + '">' + (i + 1) + '</div>'
       + '<div>'
       + '<h3 style="color:var(--text)">' + esc(c.t) + '</h3>'
       + '<p class="mt1" style="font-size:.79rem">' + esc(c.d) + '</p>'
       + '</div></div>';
  }
  return h + '</div>';
}

function buildChecklist() {
  var done = 0;
  for (var i = 0; i < S.checks.length; i++) { if (S.checks[i]) done++; }
  var pct = Math.round((done / 12) * 100);
  var h = '<div class="card">'
    + '<h2 style="color:var(--orange);margin-bottom:8px">✅ Your 12-Point Repair Checklist</h2>'
    + '<div class="prog-wrap">'
    + '<div class="prog-track"><div class="prog-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="prog-lbl"><span>' + done + ' of 12 complete</span><span style="color:var(--orange);font-weight:700">' + pct + '%</span></div>'
    + '</div>';
  for (var j = 0; j < CHECKS.length; j++) {
    var ck = S.checks[j];
    h += '<div class="ci' + (ck ? ' ck' : '') + '" onclick="toggleCheck(' + j + ')">'
       + '<div class="cb' + (ck ? ' ck' : '') + '">' + (ck ? chkSVG() : '') + '</div>'
       + '<span class="ci-lbl">' + esc(CHECKS[j]) + '</span>'
       + '</div>';
  }
  return h + '</div>';
}

function renderTab3() {
  var el = document.createElement('div');
  el.innerHTML = buildProcess()
    + '<div class="card c-gold">'
    + '<div class="badge b-gold" style="margin-bottom:7px">📋 FL PERMIT REQUIREMENT</div>'
    + '<p>All slab penetrations in FL require a permit per <strong style="color:var(--gold)">Florida Building'
    + ' Code Chapter 6</strong>. Your plumber is responsible for pulling the permit — you should never need'
    + ' to obtain this yourself. <strong style="color:var(--gold)">Unpermitted slab work can affect home'
    + ' resale</strong>, void your homeowners insurance, and create liability at sale.</p>'
    + '</div>'
    + buildChecklist()
    + leadFormHTML('t3');
  return el;
}

function toggleCheck(i) {
  S.checks[i] = !S.checks[i];
  renderAll();
}

/* ===== MAIN RENDER ===== */

function renderHeader() {
  return '<div class="hdr">'
    + '<span class="hdr-icon">🔧</span>'
    + '<h1>FL Slab Leak Detection &amp; Repair<br>Cost Guide</h1>'
    + '<p>Trusted by Florida homeowners &bull; Licensed &amp; Insured (FS 489) &bull; All of Florida</p>'
    + '<div class="hdr-badges">'
    + '<span class="badge b-blue">Free Estimates</span>'
    + '<span class="badge b-gold">FS 489 Licensed</span>'
    + '<span class="badge b-green">2-Hr Response</span>'
    + '</div>'
    + '</div>';
}

function renderTabs() {
  var labels = ['💰 Cost Calc', '📖 FL Guide', '✅ Checklist'];
  var h = '<div class="tabs">';
  for (var i = 0; i < labels.length; i++) {
    h += '<button class="tab-btn' + (S.tab === i ? ' active' : '') + '"'
       + ' onclick="switchTab(' + i + ')">'
       + esc(labels[i])
       + '</button>';
  }
  return h + '</div>';
}

function renderAll() {
  var app = $('app');
  app.innerHTML = renderHeader() + renderTabs();
  var content;
  if (S.tab === 0)      content = renderTab1();
  else if (S.tab === 1) content = renderTab2();
  else                  content = renderTab3();
  app.appendChild(content);
}

function switchTab(n) {
  S.tab = n;
  renderAll();
}

/* ---- INIT ---- */
renderAll();
</script>
</body>
</html>
