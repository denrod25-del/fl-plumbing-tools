<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── Wizard heading ─────────────────────────────────────────────────────── */

/* ─── Option tiles ───────────────────────────────────────────────────────── */
.tiles{display:grid;gap:9px;margin-bottom:16px}
.tiles.two{grid-template-columns:1fr 1fr}
.tiles.one{grid-template-columns:1fr}
.tile{background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:border-color .16s,background .16s;text-align:center;-webkit-tap-highlight-color:transparent;user-select:none}

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .18s;line-height:1;white-space:nowrap}

.btn-out{background:transparent;color:var(--muted);border:1px solid var(--border)}

.btn-gold{background:var(--gold);color:#000}

/* ─── Lead form ──────────────────────────────────────────────────────────── */
.lead{background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:18px;margin-top:18px}

/* ─── Toast ──────────────────────────────────────────────────────────────── */

/* ─── Guide: county grid ─────────────────────────────────────────────────── */

/* ─── Comparison table ───────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:13px}

.cmp-tbl td:first-child{color:var(--muted);font-size:11px;font-weight:500}
.cmp-tbl td:nth-child(2){color:var(--orange)}
.cmp-tbl td:nth-child(3){color:var(--green)}

/* ─── Process steps ──────────────────────────────────────────────────────── */
.proc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:9px;display:flex;gap:11px;align-items:flex-start}
.proc-n{background:var(--blue);color:#000;font-size:12px;font-weight:800;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.proc-ttl{font-size:13.5px;font-weight:700;margin-bottom:4px}
.proc-body{font-size:12.5px;color:var(--muted);line-height:1.55}

/* ─── Checklist ──────────────────────────────────────────────────────────── */
.pb-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;margin:10px 0 4px}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--blue) 0%,var(--gold) 100%);border-radius:99px;transition:width .4s ease;width:0%}
.pb-note{font-size:12px;color:var(--muted);text-align:right;margin-bottom:13px}
.ck-item{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ck-item:last-child{border-bottom:none}
.ck-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;margin-top:1px;font-size:12px;font-weight:800;color:transparent}
.ck-item.ckd .ck-box{background:var(--green);border-color:var(--green);color:#fff}
.ck-txt{font-size:12.5px;color:var(--text);line-height:1.55;transition:color .18s}
.ck-item.ckd .ck-txt{color:var(--muted);text-decoration:line-through}

/* ─── Section headings ───────────────────────────────────────────────────── */
.sec-hd{font-size:15.5px;font-weight:700;padding:16px 0 10px;color:var(--text);border-top:1px solid var(--border);margin-top:4px}
.sec-hd:first-child{border-top:none;padding-top:12px}

/* ─── Reset row ──────────────────────────────────────────────────────────── */
.reset-row{display:flex;justify-content:center;margin:16px 0 4px}

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media(min-width:420px){

<header class="pg-hdr">

  <p>Florida-specific pricing, county mandates &amp; step-by-step planning</p>

<div class="tab-panel active" id="p0" role="tabpanel"><div id="wizard"></div></div>

<div class="tab-panel"        id="p2" role="tabpanel"><div id="checklist"></div></div>

<script>
'use strict';

/* ── XSS guard ─────────────────────────────────────────────────────────── */
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* ── Global state ──────────────────────────────────────────────────────── */
const S = { tab:0, step:0, ans:[null,null,null,null], ck:new Set() };

/* ── Static data ───────────────────────────────────────────────────────── */
const STEPS = [
  { title:'Step 1 — Connection situation', tiles:[
    {e:'🏠', l:'Voluntary conversion',           s:'Sewer available — I want to connect'},
    {e:'⚠️', l:'Mandatory conversion',            s:'County requires it — notice received'},
    {e:'🏗️', l:'New development',                 s:'Sewer available, home never connected'},
    {e:'🚨', l:'Septic failed / imminent failure',s:'Forced to connect for permit approval'},
  ]},
  { title:'Step 2 — Property type', tiles:[
    {e:'🏡', l:'Single-family home',          s:'Standard lot'},
    {e:'🌿', l:'Single-family home',          s:'Large lot / rural — long run to main'},
    {e:'🏘️', l:'Duplex or small multi-family',s:'2–4 units'},
    {e:'🏢', l:'Condo or townhome',           s:''},
    {e:'🏕️', l:'Mobile / manufactured home',  s:''},
  ]},
  { title:'Step 3 — Distance from home to sewer main', tiles:[
    {e:'📍', l:'Very close — under 50 ft',    s:'Main is at property line'},
    {e:'📏', l:'Short — 50 to 100 ft',        s:''},
    {e:'📐', l:'Medium — 100 to 200 ft',      s:''},
    {e:'↔️', l:'Long — 200 to 400 ft',        s:''},
    {e:'🔭', l:'Very long — over 400 ft',     s:'May require a lift station'},
  ]},
  { title:'Step 4 — FL region', tiles:[
    {e:'🌴', l:'South FL',             s:'Miami-Dade, Broward, Palm Beach · +15%'},
    {e:'🌉', l:'Tampa Bay / Orlando',  s:'Base pricing'},
    {e:'🌲', l:'Jacksonville / North FL', s:'–5% vs base'},
    {e:'🦩', l:'Southwest FL',         s:'Naples, Fort Myers · +10%'},
    {e:'🏖️', l:'FL Panhandle',         s:'Pensacola, Panama City · –5%'},
  ]},
];

const LATERALS = [
  {lo:2000,  hi:5000,  lift:false},
  {lo:4000,  hi:9000,  lift:false},
  {lo:7000,  hi:16000, lift:false},
  {lo:12000, hi:28000, lift:false},
  {lo:18000, hi:45000, lift:true},
];

const REG_MULT = [1.15, 1.0, 0.95, 1.10, 0.95];

const COUNTIES = [
  {n:'Pinellas County',       b:'Most aggressive mandate in FL. Properties within 200 ft of a sewer main must connect. Fines for non-compliance. Offers payment plan over 10 years.'},
  {n:'Indian River County',   b:'Active program around the Indian River Lagoon. State and county grants available for low-income homeowners.'},
  {n:'Brevard County',        b:'Areas near the Banana River and Indian River Lagoon subject to connection requirements.'},
  {n:'Miami-Dade County',     b:'Ongoing septic elimination in coastal and canal-front areas. Some properties receive 100% grant funding through special programs.'},
  {n:'Hillsborough County',   b:'Active program for older neighborhoods. Utility assessment spread over 20 years in many areas.'},
  {n:'Other FL Counties',     b:'Sarasota, Manatee, Palm Beach, Volusia, and others have ongoing or planned programs. Check your county utilities department.'},
];

const CMP_ROWS = [
  {f:'Upfront cost',           sep:'Already paid',                  sew:'$4,500–45,000 connection cost'},
  {f:'Monthly cost',           sep:'None (maintenance only)',        sew:'$40–120/month sewer fee'},
  {f:'Maintenance',            sep:'Pump every 3–5 yrs ($350–600)', sew:'None — utility responsibility'},
  {f:'Failure risk',           sep:'High if old/neglected',          sew:'Low'},
  {f:'Property value',         sep:'Neutral in rural areas',         sew:'+$5,000–20,000 in FL markets'},
  {f:'Environmental impact',   sep:'High nitrogen/phosphorus',       sew:'Treated at wastewater facility'},
  {f:'Required by FL law?',    sep:'Yes if under mandate',           sew:'Yes after connection ordered'},
  {f:'Sell/refinance impact',  sep:'Some lenders require inspection',sew:'None'},
];

const PROC = [
  {t:'Determine if sewer is available at your property line',
   b:'Call your FL county utility or check their GIS map online. Not all FL neighborhoods have sewer mains even if you received a notice.'},
  {t:'Get your connection fee quote',
   b:'Contact the utility for the tap/connection fee. This is separate from the plumbing lateral cost.'},
  {t:'Check your connection deadline (if mandated)',
   b:'Get the exact date in writing from your county. Deadlines are real and fines accumulate quickly.'},
  {t:'Apply for all required permits',
   b:'FL requires: county building permit for lateral installation, FL DOH septic abandonment permit, and utility tap permit. Your licensed plumber handles these.'},
  {t:'Get 2–3 bids from licensed FL plumbers',
   b:'Verify FL FS 489 license. Bids should include lateral excavation, pipe installation, septic abandonment, permitting, and site restoration (sod, landscaping).'},
  {t:'Schedule and execute the work',
   b:'Typical timeline: 1–3 days for the lateral, 1 day for septic abandonment. County inspections are required before backfill.'},
  {t:'Confirm final utility connection',
   b:'The utility connects your new lateral to the sewer main. This may require a separate utility appointment after plumbing is inspected.'},
  {t:'Start sewer service — cancel septic pumping service',
   b:'Update your utility billing and stop scheduling septic pump-outs.'},
];

const CK_ITEMS = [
  'Verify sewer main exists at or near your property line (call county utility)',
  'Request your connection / tap fee quote from the utility',
  'Confirm deadline if under mandatory conversion order',
  'Check for available grants or county financing programs',
  'Get 3 bids from licensed FL plumbers (FS 489) who specialize in utility connections',
  'Confirm bid includes: lateral, septic abandonment, all permits, and site restoration',
  'Apply for septic abandonment permit (FL DOH) — your plumber should handle this',
  'Confirm county building permit has been pulled before any excavation begins',
  'Document existing septic system location with photos before abandonment',
  'Schedule final inspection and utility tap — do not backfill before inspection passes',
];

/* ── Helpers ────────────────────────────────────────────────────────────── */
function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function tx(tag, cls, text) {
  const e = mk(tag, cls);
  e.textContent = text;
  return e;
}
function fmt(n) { return '$' + n.toLocaleString(); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('up');
  setTimeout(() => t.classList.remove('up'), 3600);
}

/* ── Tab switching ──────────────────────────────────────────────────────── */
function setTab(n) {
  S.tab = n;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', i === n);
    b.setAttribute('aria-selected', i === n ? 'true' : 'false');
  });
  document.querySelectorAll('.tab-panel').forEach((p,i) =>
    p.classList.toggle('active', i === n));
}

/* ── Lead form builder ──────────────────────────────────────────────────── */
function buildLead(root) {
  const wrap = mk('div','lead');
  wrap.appendChild(tx('div','lead-hd','📞 Get a Free Estimate'));
  wrap.appendChild(tx('div','lead-sub','Speak with a licensed FL contractor — free, no obligation.'));

  [['Full Name','text','Your name'],
   ['Phone Number','tel','(561) 316-7450'],
   ['City / ZIP Code','text','City or ZIP']].forEach(([lbl,type,ph]) => {
    const fld = mk('div','fld');
    const label = tx('label','', lbl);
    const inp = mk('input'); inp.type = type; inp.placeholder = ph;
    fld.appendChild(label); fld.appendChild(inp);
    wrap.appendChild(fld);
  });

  const btn = mk('button','btn btn-gold btn-fw');
  btn.textContent = 'Request Free Call Back';
  btn.onclick = () => toast("We'll call you within 2 hours!");
  wrap.appendChild(btn);
  root.appendChild(wrap);
}

/* ── Wizard rendering ───────────────────────────────────────────────────── */
function renderWizard() {
  const root = document.getElementById('wizard');
  root.innerHTML = '';
  if (S.step >= 4) { renderResults(root); return; }

  const data = STEPS[S.step];

  // Step dots
  const dotsEl = mk('div','dots');
  for (let i = 0; i < 4; i++) {
    const cl = i < S.step ? 'dot done' : i === S.step ? 'dot curr' : 'dot next';
    dotsEl.appendChild(mk('div', cl));
  }
  root.appendChild(dotsEl);

  root.appendChild(tx('div','step-hd', data.title));

  const is5 = data.tiles.length === 5;
  const grid = mk('div', is5 ? 'tiles one' : 'tiles two');
  data.tiles.forEach((t, i) => {
    const tile = mk('div', S.ans[S.step] === i ? 'tile sel' : 'tile');
    tile.appendChild(tx('div','t-icon', t.e));
    tile.appendChild(tx('div','t-lbl', t.l));
    if (t.s) tile.appendChild(tx('div','t-sub', t.s));
    tile.onclick = () => { S.ans[S.step] = i; renderWizard(); };
    grid.appendChild(tile);
  });
  root.appendChild(grid);

  const nav = mk('div','nav-row');
  if (S.step > 0) {
    const back = mk('button','btn btn-out'); back.textContent = '← Back';
    back.onclick = () => { S.step--; renderWizard(); };
    nav.appendChild(back);
  }
  const nxt = mk('button','btn btn-blue btn-fw');
  nxt.textContent = S.step === 3 ? 'See My Estimate →' : 'Next Step →';
  if (S.ans[S.step] === null) nxt.setAttribute('disabled','');
  nxt.onclick = () => { if (S.ans[S.step] !== null) { S.step++; renderWizard(); } };
  nav.appendChild(nxt);
  root.appendChild(nav);
}

/* ── Cost calculation ───────────────────────────────────────────────────── */
function calcCosts() {
  const lat   = LATERALS[S.ans[2]];
  const mult  = REG_MULT[S.ans[3]];
  const mand  = S.ans[0] === 1;

  const round100 = n => Math.round(n / 100) * 100;
  const latLo = round100(lat.lo * mult);
  const latHi = round100(lat.hi * mult);

  return {
    lat:    { lo: latLo,  hi: latHi },
    aban:   { lo: 1000,   hi: 3500  },
    tap:    { lo: 1500,   hi: 5000  },
    plumb:  { lo: 0,      hi: 500   },
    assess: mand ? { lo: 3000, hi: 15000 } : null,
    lift:   lat.lift,
    mand,
    total: {
      lo: latLo + 1000 + 1500 + 0      + (mand ? 3000  : 0),
      hi: latHi + 3500 + 5000 + 500    + (mand ? 15000 : 0),
    },
  };
}

/* ── Results page ───────────────────────────────────────────────────────── */
function addCostRow(parent, label, value) {
  const row = mk('div','c-row');
  row.appendChild(tx('div','c-lbl', label));
  row.appendChild(tx('div','c-val', value));
  parent.appendChild(row);
}

function renderResults(root) {
  const c   = calcCosts();
  const reg = STEPS[3].tiles[S.ans[3]].l;
  const sit = STEPS[0].tiles[S.ans[0]].l;

  // Header card
  const hdr = mk('div','card anim');
  hdr.appendChild(tx('h2','','💰 Your Estimated Conversion Cost'));
  hdr.appendChild(tx('p','result-region', sit + ' · ' + reg));
  root.appendChild(hdr);

  // Itemized costs
  const bk = mk('div','card anim');
  addCostRow(bk, 'Lateral line installation', fmt(c.lat.lo) + ' – ' + fmt(c.lat.hi));
  addCostRow(bk, 'Septic system abandonment (required by FL law)', fmt(c.aban.lo) + ' – ' + fmt(c.aban.hi));
  addCostRow(bk, 'Utility connection / tap fee', fmt(c.tap.lo) + ' – ' + fmt(c.tap.hi));
  addCostRow(bk, 'Interior plumbing reroute (if needed)', fmt(c.plumb.lo) + ' – ' + fmt(c.plumb.hi));
  if (c.assess) addCostRow(bk, 'County special assessment (mandatory conversion)', fmt(c.assess.lo) + ' – ' + fmt(c.assess.hi));
  root.appendChild(bk);

  // Total
  const totCard = mk('div','card anim');
  const tw = mk('div','total-wrap');
  tw.appendChild(tx('div','total-lbl','Estimated Total Range'));
  tw.appendChild(tx('div','total-val', fmt(c.total.lo) + ' – ' + fmt(c.total.hi)));
  tw.appendChild(tx('div','total-note','Based on FL averages. Get 3 local bids for accuracy.'));
  totCard.appendChild(tw);
  root.appendChild(totCard);

  if (c.mand) renderMandCard(root);
  if (c.lift) renderLiftCard(root);

  const rr = mk('div','reset-row');
  const rb = mk('button','btn btn-out'); rb.textContent = '← Start Over';
  rb.onclick = () => { S.step = 0; S.ans = [null,null,null,null]; renderWizard(); };
  rr.appendChild(rb);
  root.appendChild(rr);

  buildLead(root);
}

function renderMandCard(root) {
  const c = mk('div','card gold');
  c.appendChild(tx('h3','gold-txt','⚠️ Mandatory Conversion — Know Your Options Before the Deadline'));
  const p = mk('p');
  p.textContent = 'FL counties with active septic-to-sewer mandates (including Pinellas, Indian River, Brevard, and parts of Miami-Dade and Hillsborough) issue "connection orders" with specific deadlines. Non-compliance can result in daily fines and the county connecting for you — at your cost plus a surcharge. Most FL utilities offer payment plans or defer the connection fee to your utility bill.';
  c.appendChild(p);
  const p2 = mk('p');
  const link = document.createElement('a');
  link.className = 'ph'; link.href = 'tel:5613167450'; link.textContent = '(561) 316-7450';
  p2.textContent = 'Call ';
  p2.appendChild(link);
  const rest = document.createTextNode(' to understand your options before the deadline.');
  p2.appendChild(rest);
  c.appendChild(p2);
  root.appendChild(c);
}

function renderLiftCard(root) {
  const c = mk('div','card orange');
  c.appendChild(tx('h3','orange-txt','🔧 Lift Station May Be Required'));
  const p = mk('p');
  p.textContent = 'If your home is more than 400 ft from the nearest sewer main, or if the sewer main is uphill, a private sewage lift station (grinder pump) may be required. Cost: $5,000–15,000 for the station plus ongoing electricity (~$20–40/month). Some FL utilities install and maintain the lift station — ask your county utility district.';
  c.appendChild(p);
  root.appendChild(c);
}

/* ── Guide (Tab 2) ──────────────────────────────────────────────────────── */
function renderGuide() {
  const root = document.getElementById('guide');
  if (root.children.length) return;

  // Why FL is mandating
  const intro = mk('div','card');
  intro.appendChild(tx('h2','','🌊 Why FL Is Mandating Septic-to-Sewer'));
  const ip = mk('p');
  ip.textContent = 'Florida has more septic systems than any other state — approximately 2.6 million. Many are aging (30–50+ years old) and contributing nitrogen and phosphorus pollution to FL\'s springs, rivers, and coastal waters. Major environmental initiatives — including the Indian River Lagoon protection program, Tampa Bay restoration, and Biscayne Bay cleanup — depend on eliminating septic systems near waterways. FL passed SB 2508 (2021) directing FDEP to identify areas where conversion is most needed.';
  intro.appendChild(ip);
  root.appendChild(intro);

  // County cards
  root.appendChild(tx('div','sec-hd','📍 FL Counties with Active Mandates & Incentives'));
  const cg = mk('div','county-grid');
  COUNTIES.forEach(c => {
    const cc = mk('div','c-card');
    cc.appendChild(tx('h4','', c.n));
    cc.appendChild(tx('p','', c.b));
    cg.appendChild(cc);
  });
  root.appendChild(cg);

  buildCompareTable(root);

  // Grant card
  const gc = mk('div','card gold');
  gc.appendChild(tx('h3','gold-txt','💰 FL Grant & Financing Programs'));
  const gp = mk('p');
  gp.textContent = 'FL homeowners required to convert may qualify for: (1) FDEP Onsite Sewage Program grants — income-based. (2) County utility special assessment financing spread over 10–20 years on the property tax bill. (3) USDA Rural Development loans for rural FL properties. (4) Specific lagoon-protection grants in Indian River and Brevard counties. Ask your county utility first — many FL counties have funding available that you won\'t find on your own.';
  gc.appendChild(gp);
  root.appendChild(gc);

  // Septic abandonment card
  const sc = mk('div','card teal');
  sc.appendChild(tx('h3','teal-txt','🪣 What Happens to the Old Septic Tank'));
  const sp = mk('p');
  sp.textContent = 'FL law (FS 381.0065) requires all abandoned septic tanks to be properly decommissioned by a licensed contractor. Standard process: (1) Pump out all remaining waste. (2) Break the bottom to allow drainage. (3) Fill with sand or concrete. (4) Cover and grade the area. (5) Submit abandonment permit to FL DOH. Cost: $1,000–3,500. Never simply stop using a tank without permitted abandonment — this is a FL code violation and a groundwater contamination risk.';
  sc.appendChild(sp);
  root.appendChild(sc);

  buildLead(root);
}

function buildCompareTable(root) {
  root.appendChild(tx('div','sec-hd','⚖️ Septic vs. Public Sewer — FL Comparison'));
  const wrap = mk('div','tbl-wrap');
  const tbl = mk('table','cmp-tbl');
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  ['Factor','Septic System','Public Sewer'].forEach(h => {
    const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });
  thead.appendChild(hrow); tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  CMP_ROWS.forEach(r => {
    const tr = document.createElement('tr');
    [r.f, r.sep, r.sew].forEach(txt => {
      const td = document.createElement('td'); td.textContent = txt; tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  root.appendChild(wrap);
}

/* ── Checklist (Tab 3) ──────────────────────────────────────────────────── */
function renderChecklist() {
  const root = document.getElementById('checklist');
  if (root.children.length) return;

  root.appendChild(tx('div','sec-hd','🗺️ FL Conversion Process — Step by Step'));
  PROC.forEach((s, i) => {
    const p = mk('div','proc');
    const num = tx('div','proc-n', String(i + 1));
    const bd = mk('div','');
    bd.appendChild(tx('div','proc-ttl', s.t));
    bd.appendChild(tx('div','proc-body', s.b));
    p.appendChild(num); p.appendChild(bd);
    root.appendChild(p);
  });

  root.appendChild(tx('div','sec-hd','✅ Conversion Planning Checklist'));

  const pbw = mk('div','pb-wrap');
  const pbf = mk('div','pb-fill'); pbf.id = 'pbf';
  pbw.appendChild(pbf); root.appendChild(pbw);
  const pbn = tx('div','pb-note','0 of 10 complete'); pbn.id = 'pbn'; root.appendChild(pbn);

  const ckCard = mk('div','card');
  CK_ITEMS.forEach((item, i) => {
    const row = mk('div', S.ck.has(i) ? 'ck-item ckd' : 'ck-item');
    row.id = 'ci' + i;
    const box = mk('div','ck-box'); if (S.ck.has(i)) box.textContent = '✓';
    const txt = tx('div','ck-txt', item);
    row.appendChild(box); row.appendChild(txt);
    row.onclick = () => toggleCk(i);
    ckCard.appendChild(row);
  });
  root.appendChild(ckCard);

  buildLead(root);
}

function toggleCk(i) {
  if (S.ck.has(i)) S.ck.delete(i); else S.ck.add(i);
  const row = document.getElementById('ci' + i);
  if (!row) return;
  const on = S.ck.has(i);
  row.className = on ? 'ck-item ckd' : 'ck-item';
  const box = row.querySelector('.ck-box');
  box.textContent = on ? '✓' : '';
  updateProgress();
}

function updateProgress() {
  const n = S.ck.size, tot = CK_ITEMS.length;
  const pct = Math.round(n / tot * 100);
  const bar = document.getElementById('pbf');
  const note = document.getElementById('pbn');
  if (bar) bar.style.width = pct + '%';
  if (note) note.textContent = n + ' of ' + tot + ' complete';
}

/* ── Boot ───────────────────────────────────────────────────────────────── */
(function init() {
  renderWizard();
  renderGuide();
  renderChecklist();
})();
</script>
</body>
</html>
